server {
    server_name nur-kitep.store www.nur-kitep.store;

    # ВАЖНО: Замените этот путь на реальный путь к проекту на сервере
    root /var/www/nur-kitep;

    # Sitemap.xml - прямая отдача из public/
    location = /sitemap.xml {
        alias /var/www/nur-kitep/public/sitemap.xml;
        types { application/xml xml; }
        add_header Content-Type "application/xml; charset=utf-8";
        add_header Cache-Control "public, max-age=3600";
        access_log off;
    }

    # Robots.txt - прямая отдача из public/
    location = /robots.txt {
        alias /var/www/nur-kitep/public/robots.txt;
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # Favicon
    location = /favicon.png {
        alias /var/www/nur-kitep/public/favicon.png;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # Статические файлы из public (иконки, изображения)
    location ~ ^/(icons|images|screenshots)/ {
        root /var/www/nur-kitep/public;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Next.js статика
    location /_next/static/ {
        alias /var/www/nur-kitep/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Все остальное проксируем на Next.js
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Таймауты
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SSL (если используете Certbot, он добавит автоматически)
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    # Если у вас уже есть SSL сертификаты, раскомментируйте:
    # ssl_certificate /etc/letsencrypt/live/nur-kitep.store/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/nur-kitep.store/privkey.pem;
    
    # SSL настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Размер загрузки файлов
    client_max_body_size 10M;
}

# Редирект с HTTP на HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name nur-kitep.store www.nur-kitep.store;
    
    # Разрешить Certbot для обновления сертификатов
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Все остальное редиректим на HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Редирект с www на без www (опционально)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.nur-kitep.store;
    
    # SSL сертификаты (те же что выше)
    # ssl_certificate /etc/letsencrypt/live/nur-kitep.store/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/nur-kitep.store/privkey.pem;
    
    return 301 https://nur-kitep.store$request_uri;
}
